<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加盟戰情室 🚀 (v14.0 極致穩定版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Google Fonts 讓字體更年輕、圓潤 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">

    <!-- 🌟 終極解法：引入穩定的 FontAwesome 圖示庫 (取代原本會當機的 React SVG Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Leaflet 地圖引擎 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Excel & Canvas -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { 
            font-family: 'Nunito', 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc;
        }
        #map-container { height: 100%; width: 100%; min-height: 400px; }
        
        /* 青春版背景點點 */
        .bg-pattern { 
            background-color: #eef2ff; 
            background-image: radial-gradient(#c7d2fe 2px, transparent 2px); 
            background-size: 30px 30px; 
        }
        
        /* 地圖自訂現代感標籤 */
        .store-label, .store-label-large {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(4px) !important;
            padding: 4px 12px !important;
            border-radius: 99px !important;
            font-size: 13px !important;
            font-weight: 800 !important;
            color: #4338ca !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06) !important;
            margin-top: 15px !important;
            border: 2px solid #e0e7ff !important;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .store-label-large {
            font-size: 15px !important;
            color: #be123c !important;
            border-color: #ffe4e6 !important;
        }

        .leaflet-tooltip-bottom:before, .leaflet-tooltip-top:before, .leaflet-tooltip-left:before, .leaflet-tooltip-right:before { display: none !important; }
        .leaflet-tooltip { background: transparent !important; border: none !important; box-shadow: none !important; }
        
        /* 年輕化 Popup 按鈕 */
        .leaflet-popup-content-wrapper { border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .leaflet-popup-content { margin: 12px; min-width: 170px; font-family: 'Noto Sans TC', sans-serif; }
        .leaflet-popup-content p { margin: 0 0 12px 0; font-weight: 900; font-size: 16px; color: #1e293b; border-bottom: 2px dashed #e2e8f0; padding-bottom: 8px; text-align: center; }
        .popup-btn { display: block; width: 100%; padding: 8px 12px; margin-bottom: 6px; border-radius: 99px; font-size: 13px; font-weight: bold; cursor: pointer; text-align: center; transition: all 0.2s; border: none; }
        .popup-btn.primary { background: #e0e7ff; color: #4f46e5; }
        .popup-btn.primary:hover { background: #c7d2fe; transform: scale(1.02); }
        .popup-btn.neutral { background: #f1f5f9; color: #475569; }
        .popup-btn.neutral:hover { background: #e2e8f0; transform: scale(1.02); }
        .popup-btn.danger { background: #ffe4e6; color: #e11d48; }
        .popup-btn.danger:hover { background: #fecdd3; transform: scale(1.02); }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .z-highest { z-index: 99999 !important; }
        .drawing-controls { z-index: 2000 !important; pointer-events: auto; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden bg-gradient-to-br from-indigo-50 via-white to-cyan-50">
    
    <div id="root" class="h-full flex flex-col p-3 gap-3"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // 16 種精選顏色
        const POLYGON_COLORS = [
            '#6366f1', '#f43f5e', '#f59e0b', '#10b981', '#8b5cf6', '#ec4899', '#0ea5e9', '#14b8a6',
            '#ef4444', '#f97316', '#eab308', '#84cc16', '#22c55e', '#06b6d4', '#3b82f6', '#1f2937'
        ];

        // --- Distance & Geometery Utils ---
        const simpleDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371e3; const φ1 = lat1 * Math.PI/180; const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180; const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        };
        const isPointInPolygon = (point, vs) => {
            const x = point[0], y = point[1]; let inside = false;
            for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
                const xi = vs[i][0], yi = vs[i][1]; const xj = vs[j][0], yj = vs[j][1];
                const intersect = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            } return inside;
        };
        const DEFAULT_CENTER = [25.0422, 121.5060];

        // --- 登入畫面元件 ---
        const LoginScreen = ({ onLogin }) => {
            const [pass, setPass] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (pass === '8888') {
                    onLogin();
                } else {
                    setError('通關密碼不對喔！再試一次 🥺');
                }
            };

            return (
                <div className="fixed inset-0 w-full h-full flex items-center justify-center bg-pattern z-highest">
                    <div className="bg-white/80 backdrop-blur-xl p-10 rounded-[2rem] shadow-2xl border border-white w-full max-w-sm transform transition-all hover:scale-105 duration-500 relative overflow-hidden">
                        
                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>
                        <div className="absolute -top-20 -right-20 w-40 h-40 bg-purple-200 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-pulse"></div>
                        <div className="absolute -bottom-20 -left-20 w-40 h-40 bg-indigo-200 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-pulse" style={{animationDelay: '1s'}}></div>

                        <div className="flex justify-center mb-6 relative">
                            <div className="bg-gradient-to-tr from-indigo-500 to-purple-500 p-4 rounded-2xl shadow-lg shadow-indigo-200 text-white transform -rotate-6">
                                <i className="fa-solid fa-store text-2xl"></i>
                            </div>
                        </div>
                        
                        <h2 className="text-3xl font-black text-center text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-8 tracking-wide">
                            加盟戰情室
                        </h2>

                        <form onSubmit={handleSubmit} className="relative z-10">
                            <div className="mb-5">
                                <label className="block text-indigo-900 text-sm font-extrabold mb-2 ml-1">通關密碼 🔒</label>
                                <input 
                                    type="password" 
                                    value={pass}
                                    onChange={(e) => {setPass(e.target.value); setError('');}}
                                    className="w-full px-5 py-4 rounded-2xl bg-indigo-50/50 border-2 border-indigo-100 focus:outline-none focus:ring-4 focus:ring-indigo-500/30 focus:border-indigo-400 transition-all text-indigo-900 font-bold text-center tracking-widest text-lg shadow-inner"
                                    placeholder="••••"
                                    autoFocus
                                />
                            </div>

                            {error && <div className="mb-4 bg-rose-50 text-rose-500 text-xs font-bold p-3 rounded-xl border border-rose-100 text-center animate-bounce">{error}</div>}
                            
                            <button className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-4 px-4 rounded-2xl shadow-xl shadow-indigo-200 transform transition-all active:scale-95 mt-2 text-lg tracking-wide" type="submit">
                                進入系統 🚀
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // --- 共用互動視窗 ---
        const ConfirmModal = ({ title, message, onConfirm, onCancel, confirmText = "確定", cancelText = "取消", isDangerous = false }) => (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm transform animate-[scale-in_0.2s_ease-out] overflow-hidden border border-white">
                    <div className="p-8 text-center">
                        <div className={`w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4 text-2xl ${isDangerous ? 'bg-rose-100 text-rose-500' : 'bg-indigo-100 text-indigo-500'}`}>
                            {isDangerous ? <i className="fa-solid fa-triangle-exclamation"></i> : <i className="fa-solid fa-wand-magic-sparkles"></i>}
                        </div>
                        <h3 className="font-black text-xl text-slate-800 mb-2">{title}</h3>
                        <p className="text-slate-500 text-sm font-medium whitespace-pre-wrap leading-relaxed">{message}</p>
                    </div>
                    <div className="p-4 bg-slate-50 flex gap-3">
                        <button onClick={onCancel} className="flex-1 py-3 bg-white text-slate-600 rounded-xl text-sm font-bold hover:bg-slate-100 transition-colors border border-slate-200 shadow-sm">
                            {cancelText}
                        </button>
                        <button onClick={onConfirm} className={`flex-1 py-3 text-white rounded-xl text-sm font-bold transition-all shadow-lg hover:scale-105 active:scale-95 ${isDangerous ? 'bg-rose-500 hover:bg-rose-600 shadow-rose-200' : 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-200'}`}>
                            {confirmText}
                        </button>
                    </div>
                </div>
            </div>
        );

        const AlertModal = ({ message, onClose }) => (
             <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm transform animate-[scale-in_0.2s_ease-out] overflow-hidden border border-white">
                    <div className="p-8 text-center">
                        <div className="w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4 bg-indigo-100 text-indigo-500 text-2xl">
                            <i className="fa-solid fa-circle-check"></i>
                        </div>
                        <h3 className="font-black text-xl text-slate-800 mb-2">系統訊息</h3>
                        <p className="text-slate-500 text-sm font-medium whitespace-pre-wrap leading-relaxed">{message}</p>
                    </div>
                    <div className="p-4 bg-slate-50 flex">
                        <button onClick={onClose} className="w-full py-3 bg-indigo-600 text-white rounded-xl text-sm font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-transform active:scale-95">確定</button>
                    </div>
                </div>
            </div>
        );

        const PasteModal = ({ isOpen, onClose, onProcess }) => {
            const [text, setText] = useState('');
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[9998] flex items-center justify-center p-4">
                    <div className="bg-white/90 backdrop-blur-xl rounded-[2rem] shadow-2xl w-full max-w-lg flex flex-col max-h-[90vh] overflow-hidden border border-white">
                        <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
                            <h3 className="font-black text-xl text-slate-800 flex items-center gap-2 text-indigo-600">
                                <i className="fa-solid fa-clipboard"></i> 貼上文字匯入
                            </h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-rose-500 transition-colors p-2 rounded-full hover:bg-rose-50"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                        <div className="p-6 flex-1 overflow-hidden flex flex-col bg-slate-50/50">
                            <p className="text-sm text-slate-500 mb-3 font-bold">請直接貼上店名與地址，一行一筆資料。</p>
                            <textarea 
                                className="flex-1 w-full border-2 border-indigo-100 rounded-2xl p-4 text-sm font-mono focus:ring-4 focus:ring-indigo-500/30 focus:border-indigo-400 focus:outline-none resize-none shadow-inner text-slate-700" 
                                placeholder="西門店, 台北市成都路10號&#10;龍山店, 台北市和平西路三段120號" 
                                value={text} 
                                onChange={(e) => setText(e.target.value)} 
                            />
                        </div>
                        <div className="p-6 border-t border-slate-100 bg-white flex justify-end gap-3">
                            <button onClick={onClose} className="px-6 py-3 text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-xl text-sm font-bold transition-colors">取消</button>
                            <button onClick={() => onProcess(text)} disabled={!text.trim()} className="px-6 py-3 bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-xl text-sm font-bold shadow-lg shadow-indigo-200 hover:from-indigo-600 hover:to-purple-600 disabled:opacity-50 transition-all active:scale-95">
                                開始分析 ✨
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const EditStoreModal = ({ store, onClose, onSave }) => {
            const [name, setName] = useState(store?.name || '');
            const [radius, setRadius] = useState(store?.radius || 0);
            useEffect(() => { if(store) { setName(store.name); setRadius(store.radius); } }, [store]);
            if (!store) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                    <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden border border-white animate-[scale-in_0.2s_ease-out]">
                        <div className="p-6 border-b border-slate-100 bg-white flex justify-between items-center">
                            <h3 className="font-black text-xl text-indigo-600 flex items-center gap-2"><i className="fa-solid fa-pen-to-square"></i> 編輯屬性</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-rose-500 p-2 rounded-full hover:bg-rose-50 transition-colors"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                        <div className="p-6 flex flex-col gap-5 bg-slate-50/50">
                            <div>
                                <label className="block text-sm font-black text-slate-700 mb-2 ml-1">店名</label>
                                <input className="w-full border-2 border-slate-200 rounded-xl p-3 text-sm font-bold text-slate-700 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all shadow-sm" value={name} onChange={e => setName(e.target.value)} />
                            </div>
                            {store.type === 'radius' && (
                                <div>
                                    <label className="block text-sm font-black text-slate-700 mb-2 ml-1">保障半徑 (公尺)</label>
                                    <input type="number" className="w-full border-2 border-slate-200 rounded-xl p-3 text-sm font-bold text-slate-700 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all shadow-sm" value={radius} onChange={e => setRadius(Number(e.target.value))} />
                                </div>
                            )}
                            {store.type === 'polygon' && <p className="text-xs text-purple-600 font-bold bg-purple-50 p-3 rounded-xl border border-purple-100">此為多邊形區域，無法修改半徑。如需修改範圍，請使用「重繪」功能。</p>}
                            {store.type === 'point' && <p className="text-xs text-orange-600 font-bold bg-orange-50 p-3 rounded-xl border border-orange-100">此為純地標，無保障半徑。</p>}
                        </div>
                        <div className="p-6 border-t border-slate-100 bg-white flex justify-end gap-3">
                            <button onClick={onClose} className="px-6 py-3 text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-xl text-sm font-bold transition-colors">取消</button>
                            <button onClick={() => onSave(store.id, name, radius)} className="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-bold shadow-lg shadow-indigo-200 transition-all active:scale-95">儲存變更</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 主系統 ---
        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [mapLoaded, setMapLoaded] = useState(false);
            
            const [stores, setStores] = useState([]);
            const [defaultRadius, setDefaultRadius] = useState(1500);
            const [newStoreName, setNewStoreName] = useState('');
            const [mode, setMode] = useState('check'); 
            const [statusMsg, setStatusMsg] = useState('準備就緒，請點擊地圖探測');
            const [statusType, setStatusType] = useState('neutral'); 
            const [isProcessing, setIsProcessing] = useState(false);
            const [confirmAction, setConfirmAction] = useState(null); 
            const [alertMessage, setAlertMessage] = useState(null);
            
            // 繪圖狀態
            const [tempPolygon, setTempPolygon] = useState([]);
            const [mousePos, setMousePos] = useState(null);
            const [isPolygonClosed, setIsPolygonClosed] = useState(false);
            const [polygonColor, setPolygonColor] = useState(POLYGON_COLORS[0]);
            const [editingStoreId, setEditingStoreId] = useState(null);
            
            // 搜尋與 UI 狀態
            const [searchAddress, setSearchAddress] = useState('');
            const [isSearchingAddress, setIsSearchingAddress] = useState(false);
            const [showPasteModal, setShowPasteModal] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [showTools, setShowTools] = useState(false); 
            const [editingProps, setEditingProps] = useState(null);
            const [candidate, setCandidate] = useState(null);
            const [checkResult, setCheckResult] = useState({ status: 'idle', message: '' });

            const mapRef = useRef(null); 
            const googleMapRef = useRef(null); // 使用 Leaflet 但套用 Google Tiles
            const layersRef = useRef([]);
            const fileInputRef = useRef(null);
            const jsonInputRef = useRef(null);
            const sidebarRef = useRef(null);

            // 初始化與自動相容舊版資料格式
            useEffect(() => {
                try {
                    const saved = localStorage.getItem('franchiseMapData_Google');
                    let initialStores = saved ? JSON.parse(saved) : [];
                    
                    const ids = new Set();
                    const cleanStores = [];
                    
                    initialStores.forEach(s => {
                        // 防呆：確保 center 是陣列 [lat, lng]
                        let center = s.center;
                        if (center && center.lat !== undefined) {
                            center = [center.lat, center.lng];
                        }
                        // 防呆：確保 points 是陣列的陣列 [[lat, lng], ...]
                        let points = s.points;
                        if (points && points.length > 0 && points[0].lat !== undefined) {
                            points = points.map(p => [p.lat, p.lng]);
                        }
                        
                        const newStore = { ...s, center, points };

                        if (ids.has(s.id)) {
                            cleanStores.push({ ...newStore, id: Date.now() + Math.random() });
                        } else {
                            ids.add(s.id);
                            cleanStores.push(newStore);
                        }
                    });
                    setStores(cleanStores.length > 0 ? cleanStores : []);
                } catch (e) {
                    console.error("載入資料錯誤:", e);
                    setStores([]);
                }
            }, []);

            // 儲存資料
            useEffect(() => {
                if (isAuthenticated) localStorage.setItem('franchiseMapData_Google', JSON.stringify(stores));
            }, [stores, isAuthenticated]);

            // 初始化 Leaflet 地圖 (套用 Google 圖資)
            useEffect(() => {
                if (!isAuthenticated) return;
                if (!mapRef.current || googleMapRef.current) return;
                setTimeout(() => {
                    if (!mapRef.current) return;
                    
                    const map = L.map(mapRef.current, { preferCanvas: true, zoomControl: false }).setView(DEFAULT_CENTER, 14);
                    
                    // ⭐ 使用 Google Maps 免費版圖資 (免 Key)
                    L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { 
                        attribution: '© Google Maps',
                        maxZoom: 20
                    }).addTo(map);
                    
                    L.control.zoom({ position: 'bottomright' }).addTo(map);
                    
                    googleMapRef.current = map;
                    setMapLoaded(true);
                    setTimeout(() => { map.invalidateSize(); }, 100);
                }, 100);
            }, [isAuthenticated]);

            // 使用 Refs 確保監聽器拿到最新狀態
            const stateRef = useRef({ mode, newStoreName, stores, tempPolygon, defaultRadius, editingStoreId, isPolygonClosed, polygonColor });
            useEffect(() => {
                stateRef.current = { mode, newStoreName, stores, tempPolygon, defaultRadius, editingStoreId, isPolygonClosed, polygonColor };
                
                // 全域橋接：給 Marker Popup 呼叫
                window.handleStoreAction = (id, action) => {
                    const store = stateRef.current.stores.find(s => String(s.id) === String(id));
                    if (!store) return;
                    
                    if (googleMapRef.current) googleMapRef.current.closePopup();

                    if (action === 'check') {
                        const pt = store.type === 'radius' || store.type === 'point' ? store.center : store.points[0];
                        checkConflict({ lat: pt[0], lng: pt[1] }, store.id);
                    } else if (action === 'redraw') {
                        setConfirmAction({
                            type: 'redraw', data: store, title: '🎨 重新繪製區域',
                            message: `確定要為「${store.name}」重畫範圍嗎？\n原本的形狀將會被取代喔！`
                        });
                    } else if (action === 'delete') {
                        setConfirmAction({
                            type: 'delete', data: store, title: '🗑️ 確認刪除',
                            message: `要和「${store.name}」說再見了嗎？\n(刪除後無法復原喔)`, isDangerous: true
                        });
                    } else if (action === 'edit') {
                        setEditingProps(store);
                    }
                };
            }, [mode, newStoreName, stores, tempPolygon, defaultRadius, editingStoreId, isPolygonClosed, polygonColor]);

            // 地圖事件綁定
            useEffect(() => {
                if (!googleMapRef.current) return;
                const map = googleMapRef.current;
                
                map.off('click mousemove dblclick');

                map.on('click', (e) => {
                    const current = stateRef.current;
                    const pt = [e.latlng.lat, e.latlng.lng];

                    if (current.mode === 'check') {
                        checkConflict({ lat: pt[0], lng: pt[1] });
                    } else if (current.mode === 'add-radius') {
                        const finalName = current.newStoreName.trim() || `新據點-${Math.floor(Math.random()*1000)}`;
                        const newStore = { id: Date.now(), name: finalName, type: 'radius', center: pt, radius: current.defaultRadius, points: [] };
                        setStores(prev => [...prev, newStore]);
                        setNewStoreName('');
                        setMode('check');
                        setStatusMsg(`成功建立：${finalName} 🎉`);
                        setStatusType('success');
                    } else if (current.mode === 'add-polygon') {
                        if (!current.isPolygonClosed) {
                            setTempPolygon(prev => [...prev, pt]);
                        }
                    }
                });

                map.on('mousemove', (e) => {
                    const current = stateRef.current;
                    if (current.mode === 'add-polygon' && !current.isPolygonClosed) {
                        setMousePos([e.latlng.lat, e.latlng.lng]);
                    } else {
                        setMousePos(null);
                    }
                });

                map.on('dblclick', (e) => {
                    const current = stateRef.current;
                    if (current.mode === 'add-polygon' && !current.isPolygonClosed) {
                        L.DomEvent.stopPropagation(e);
                        setIsPolygonClosed(true);
                        setMousePos(null);
                    }
                });

                if (mode === 'add-polygon') {
                    map.doubleClickZoom.disable();
                    map.getContainer().style.cursor = 'crosshair';
                } else {
                    map.doubleClickZoom.enable();
                    map.getContainer().style.cursor = '';
                }
            }, [mapLoaded, mode]);

            // 當店家資料或繪圖狀態改變時重繪圖層
            useEffect(() => {
                if (!googleMapRef.current || !window.L) return;
                renderLayers();
            }, [stores, tempPolygon, mousePos, isPolygonClosed, editingStoreId, polygonColor, checkResult]);

            const executeConfirmAction = () => {
                if (!confirmAction) return;
                const { type, data } = confirmAction;

                if (type === 'delete') {
                    setStores(prev => prev.filter(s => s.id !== data.id));
                    setStatusMsg(`已刪除 ${data.name}`);
                    setStatusType('success');
                } else if (type === 'redraw') {
                    setEditingStoreId(data.id); 
                    setNewStoreName(data.name); 
                    setTempPolygon([]);
                    setIsPolygonClosed(false);
                    setMode('add-polygon');
                    if (data.color) setPolygonColor(data.color);
                    setStatusMsg(`請在地圖上點擊繪製「${data.name}」的新範圍`);
                    setStatusType('neutral');
                    setShowTools(false);
                    if(sidebarRef.current) sidebarRef.current.scrollTop = 0;
                } else if (type === 'clear') {
                    setStores([]);
                    setStatusMsg('資料已清空 ✨');
                    setStatusType('neutral');
                } else if (type === 'reset') {
                    localStorage.removeItem('franchiseMapData_Google');
                    window.location.reload();
                }
                setConfirmAction(null);
            };

            const undoLastPoint = () => {
                if (isPolygonClosed) setIsPolygonClosed(false);
                else setTempPolygon(prev => prev.slice(0, -1));
            };

            const finishPolygon = () => {
                const current = stateRef.current;
                if (!current.isPolygonClosed) { setAlertMessage("畫圈圈至少需要點擊 3 個點，並且要雙擊封閉喔！🤔"); return; }
                if (current.tempPolygon.length < 3) { setAlertMessage("多邊形至少需要3個點"); return; }
                
                const polyPoints = current.tempPolygon; // 已經是 [lat, lng] 格式

                if (current.editingStoreId) {
                    setStores(prev => prev.map(s => String(s.id) === String(current.editingStoreId) ? { ...s, type: 'polygon', points: polyPoints, radius: 0, color: current.polygonColor } : s));
                    setEditingStoreId(null); setTempPolygon([]); setNewStoreName(''); setMode('check'); setIsPolygonClosed(false); setMousePos(null);
                    setStatusMsg("區域更新成功！ 🎉"); setStatusType('success');
                } else {
                    const finalName = current.newStoreName.trim() || `自訂區域-${Math.floor(Math.random()*1000)}`;
                    const newStore = { id: Date.now(), name: finalName, type: 'polygon', center: null, radius: 0, points: polyPoints, color: current.polygonColor };
                    setStores(prev => [...prev, newStore]); setTempPolygon([]); setNewStoreName(''); setMode('check'); setIsPolygonClosed(false); setMousePos(null);
                    setStatusMsg(`成功建立區域：${finalName} 🎉`); setStatusType('success');
                }
            };

            const lockPolygon = (e) => {
                if(e) { e.stopPropagation(); e.preventDefault(); }
                setIsPolygonClosed(true); setMousePos(null);
            };

            const checkConflict = (point, excludeId = null) => {
                let conflicts = [];
                stores.forEach(store => {
                    if (store.id == excludeId) return;
                    let isConflict = false;
                    if (store.type === 'radius' && store.radius > 0) {
                        if (simpleDistance(point.lat, point.lng, store.center[0], store.center[1]) <= store.radius) {
                            isConflict = true;
                        }
                    } else if (store.type === 'polygon') {
                        if (isPointInPolygon([point.lat, point.lng], store.points)) {
                            isConflict = true;
                        }
                    }
                    if (isConflict) conflicts.push(`${store.name}`);
                });

                if (conflicts.length > 0) {
                    setStatusType('error');
                    setStatusMsg(`🚨 警報！進入了以下禁區：${conflicts.join(', ')}`);
                    setCheckResult({ status: 'blocked', point: [point.lat, point.lng] });
                } else {
                    setStatusType('success');
                    setStatusMsg('✅ 檢測通過：此位置非常安全。');
                    setCheckResult({ status: 'allowed', point: [point.lat, point.lng] });
                }
            };

            const renderLayers = () => {
                const map = googleMapRef.current;
                layersRef.current.forEach(l => map.removeLayer(l));
                layersRef.current = [];

                stores.forEach(store => {
                    const isEditing = String(store.id) === String(editingStoreId);
                    const color = isEditing ? '#9ca3af' : (store.color || (store.type === 'radius' ? '#6366f1' : '#a855f7'));
                    const dashArray = isEditing ? '5, 10' : null;
                    let layerGroup = [];
                    
                    const popupContent = `
                        <div class="info-window-content">
                            <p>${store.name}</p>
                            <button class="popup-btn neutral" onclick="window.handleStoreAction(${store.id}, 'check')"><i class="fa-solid fa-magnifying-glass"></i> 檢測中心點</button>
                            <button class="popup-btn primary" onclick="window.handleStoreAction(${store.id}, 'redraw')"><i class="fa-solid fa-pen-to-square"></i> 重新畫範圍</button>
                            <button class="popup-btn danger" onclick="window.handleStoreAction(${store.id}, 'delete')"><i class="fa-solid fa-trash"></i> 刪除這間店</button>
                        </div>
                    `;

                    let centerPoint;
                    if (store.type === 'radius' || store.type === 'point') {
                        centerPoint = store.center;
                        if (store.type === 'radius' && store.radius > 0) {
                            const circle = L.circle(centerPoint, {
                                color: color, fillColor: color, fillOpacity: 0.15, weight: 2, radius: store.radius, dashArray
                            }).addTo(map);
                            layerGroup.push(circle);
                        }
                    } else if (store.type === 'polygon') {
                        const poly = L.polygon(store.points, {
                            color: color, fillColor: color, fillOpacity: 0.2, weight: 3, dashArray
                        }).addTo(map);
                        centerPoint = poly.getBounds().getCenter();
                        layerGroup.push(poly);
                    }

                    if (centerPoint) {
                        const marker = L.marker(centerPoint, {
                            icon: L.divIcon({
                                className: 'custom-dot-icon',
                                html: `<div style="background-color: ${color}; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; box-shadow: 0px 2px 4px rgba(0,0,0,0.3);"></div>`,
                                iconSize: [12, 12], iconAnchor: [6, 6]
                            })
                        }).addTo(map);
                        marker.bindTooltip(store.name, { permanent: true, direction: 'top', className: store.type === 'point' ? 'store-label-large' : 'store-label', offset: [0, -8] });
                        marker.bindPopup(popupContent, { className: 'young-popup' });
                        layerGroup.push(marker);
                    }

                    layersRef.current.push(...layerGroup);
                });

                // Draw Temp Polygon
                if (tempPolygon.length > 0) {
                    const drawColor = polygonColor;
                    const fillOpac = isPolygonClosed ? 0.3 : 0;
                    const dash = isPolygonClosed ? null : '5,5';

                    if (isPolygonClosed) {
                        layersRef.current.push(L.polygon(tempPolygon, { color: drawColor, weight: 3, fillOpacity: fillOpac, interactive: false }).addTo(map));
                    } else {
                        layersRef.current.push(L.polyline(tempPolygon, { color: drawColor, weight: 3, dashArray: dash, interactive: false }).addTo(map));
                    }
                    
                    tempPolygon.forEach((pt, i) => {
                        layersRef.current.push(L.circleMarker(pt, { radius: 5, color: drawColor, fillColor: '#fff', fillOpacity: 1, weight: 2, interactive: false }).addTo(map));
                    });

                    if (mousePos && !isPolygonClosed) {
                        layersRef.current.push(L.polyline([tempPolygon[tempPolygon.length - 1], mousePos], { color: drawColor, weight: 2, dashArray: '2,6', opacity: 0.7, interactive: false }).addTo(map));
                    }
                }

                // Draw Candidate Check Result
                if (checkResult.status !== 'idle' && checkResult.point) {
                    const isBlocked = checkResult.status === 'blocked';
                    const icon = L.divIcon({ className: 'custom-icon', html: `<div style="background-color: ${isBlocked ? '#f43f5e' : '#10b981'}; width: 24px; height: 24px; border-radius: 50%; border: 4px solid white; box-shadow: 0 0 15px rgba(0,0,0,0.3); animation: pulse 1.5s infinite;"></div>`, iconSize: [24, 24], iconAnchor: [12, 12] }); 
                    layersRef.current.push(L.marker(checkResult.point, { icon, interactive: false }).addTo(map)); 
                }
            };

            // --- 地址搜尋功能 (使用強大的雙引擎 Fallback) ---
            const searchAddressWithFallback = async (addr) => {
                const tryFetch = async (queryStr) => {
                    try {
                        let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(queryStr)}&limit=1&accept-language=zh-TW&countrycodes=tw`);
                        let data = await res.json();
                        if (data && data.length > 0) return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
                        
                        res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(queryStr)}&limit=1`);
                        data = await res.json();
                        if (data.features && data.features.length > 0) {
                            return { lat: data.features[0].geometry.coordinates[1], lon: data.features[0].geometry.coordinates[0] };
                        }
                    } catch (e) { console.error("Geocoding fetch error:", e); }
                    return null;
                };

                let result = await tryFetch(addr);
                if (result) return result;

                // Fallback: 把「號、樓、室、F、B」拿掉，只搜路名
                const fuzzyAddr = addr.replace(/\d+[-~之]?\d*(號|樓|F|f|B|室).*/i, '').trim();
                if (fuzzyAddr && fuzzyAddr !== addr) {
                    result = await tryFetch(fuzzyAddr);
                    if (result) return result;
                }
                return null;
            };

            const handleAddressSearch = async () => {
                if (!searchAddress.trim()) return;
                setIsSearchingAddress(true);
                try {
                    const result = await searchAddressWithFallback(searchAddress);
                    if (result) {
                        const pt = [result.lat, result.lon];
                        if (googleMapRef.current) googleMapRef.current.flyTo(pt, 16, { animate: true, duration: 1.5 });
                        checkConflict({lat: result.lat, lng: result.lon});
                        setMode('check');
                        setSearchAddress(''); 
                    } else {
                        setAlertMessage(`找不到「${searchAddress}」的精確座標。\n\n💡 建議：\n嘗試刪除門牌號碼，只輸入「區」和「路名」讓地圖飛到附近後再手動標記喔！`);
                    }
                } catch (e) {
                    setAlertMessage("地址搜尋發生錯誤，請檢查網路連線。");
                } finally {
                    setIsSearchingAddress(false);
                }
            };

            const handleExportImage = async () => {
                setIsProcessing(true);
                setAlertMessage("📸 正在洗照片中，若因跨域限制失敗，請使用電腦自帶截圖喔！");
                try {
                    const mapElement = document.getElementById('map-container');
                    const canvas = await window.html2canvas(mapElement, { useCORS: true, allowTaint: false, backgroundColor: '#f8fafc' });
                    const imgData = canvas.toDataURL('image/jpeg', 0.9);
                    const link = document.createElement('a'); link.download = `加盟戰情圖_${new Date().toISOString().split('T')[0]}.jpg`; link.href = imgData; link.click();
                    setAlertMessage("✨ 照片洗好囉！已下載至您的電腦。");
                } catch (error) {
                    setAlertMessage("截圖失敗，建議直接使用系統截圖快捷鍵 (PrtScn) 功能喔！");
                } finally {
                    setIsProcessing(false);
                }
            };

            const handlePasteImport = (text) => {
                setShowPasteModal(false); const lines = text.split('\n').filter(line => line.trim() !== ''); if (lines.length === 0) return;
                const addressQueue = []; const currentDefaultRadius = stateRef.current.defaultRadius;
                lines.forEach((line, idx) => {
                    let parts = line.split(/[,，\t]+/).map(p => p.trim()).filter(p => p);
                    if (parts.length >= 2) { let name = parts[0]; let addr = parts[1]; if (name.length > addr.length && (name.includes('號') || name.includes('路') || name.includes('街'))) { [name, addr] = [addr, name]; } addressQueue.push({ id: Date.now() + idx, name, addr: cleanAddress(addr), radius: currentDefaultRadius }); }
                    else if (parts.length === 1) addressQueue.push({ id: Date.now() + idx, name: `匯入店鋪-${idx+1}`, addr: cleanAddress(parts[0]), radius: currentDefaultRadius });
                });
                if (addressQueue.length > 0) processBatchGeocoding(addressQueue); else setAlertMessage("無法識別資料。");
            };

            const downloadTemplate = () => { const csvContent = "\uFEFF店名,地址,半徑,緯度,經度\n台北示範店,台北市萬華區成都路10號,1500,,\n高雄示範店,高雄市前金區中正四路211號,1500,,"; const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' })); link.download = "店家匯入範例.csv"; document.body.appendChild(link); link.click(); document.body.removeChild(link); };
            const handleExportJSON = () => { const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([JSON.stringify(stores, null, 2)], { type: 'application/json' })); link.download = `加盟地圖備份_${new Date().toISOString().split('T')[0]}.json`; document.body.appendChild(link); link.click(); document.body.removeChild(link); };
            const handleImportJSON = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (evt) => { try { const json = JSON.parse(evt.target.result); if (Array.isArray(json) && confirm(`即將匯入 ${json.length} 筆資料？`)) setStores(json); } catch(err) { setAlertMessage("JSON 錯誤"); } }; reader.readAsText(file); e.target.value = null; };
            const handleFileUpload = (e) => { const file = e.target.files[0]; if (!file) return; setIsProcessing(true); const reader = new FileReader(); reader.onload = (evt) => { const wb = XLSX.read(evt.target.result, { type: 'binary' }); processImportedData(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]])); }; reader.readAsBinaryString(file); e.target.value = null; };
            const sleep = (ms) => new Promise(r => setTimeout(r, ms));
            const cleanAddress = (addr) => addr ? addr.toString().replace(/\(.*?\)/g, "").replace(/（.*?）/g, "").replace(/(\d+)([-~之]\d+)?(樓|F|f|B\d+).*/g, "").replace(/\d+室$/g, "").trim() : "";
            
            const processImportedData = async (data) => {
                let success = 0, fail = 0; let addressQueue = []; const newStores = []; const currentDefaultRadius = stateRef.current.defaultRadius;
                data.forEach((row, idx) => { 
                    const name = row['店名'] || row['名稱'] || `匯入-${idx+1}`; 
                    const radius = parseFloat(row['半徑'] || row['radius']) || currentDefaultRadius; 
                    const type = radius > 0 ? 'radius' : 'point';
                    const lat = parseFloat(row['緯度'] || row['lat']); 
                    const lng = parseFloat(row['經度'] || row['lng']); 
                    const rawAddr = row['地址'] || row['Address'] || row['addr']; 
                    
                    if (!isNaN(lat) && !isNaN(lng)) { 
                        newStores.push({ id: Date.now()+idx, name, type, center: [lat, lng], radius, points: [] }); success++; 
                    } else if (rawAddr) {
                        addressQueue.push({ id: Date.now()+idx, name, addr: cleanAddress(rawAddr), radius, type }); 
                    } else fail++; 
                });
                if (success > 0) { setStores(prev => [...prev, ...newStores]); if(googleMapRef.current && newStores[0]) googleMapRef.current.setView(newStores[0].center, 13); }
                if (addressQueue.length > 0) { if (confirm(`發現 ${addressQueue.length} 筆資料只有地址，開始轉換？`)) processBatchGeocoding(addressQueue); } else if (success > 0) setAlertMessage(`成功匯入 ${success} 筆！`); setIsProcessing(false);
            };
            
            const processBatchGeocoding = async (queue) => {
                setIsProcessing(true); let converted = 0, failed = 0;
                for (let i = 0; i < queue.length; i++) { 
                    const item = queue[i]; 
                    try { 
                        const result = await searchAddressWithFallback(item.addr);
                        if (result) {
                            const type = item.radius > 0 ? 'radius' : 'point';
                            setStores(prev => [...prev, { id: item.id, name: item.name, type: type, center: [result.lat, result.lon], radius: item.radius, points: [] }]); 
                            converted++; 
                        } else { failed++; }
                    } catch (e) { failed++; } await sleep(1200); 
                }
                setIsProcessing(false); setAlertMessage(`地址處理完成！成功: ${converted} 筆, 失敗: ${failed} 筆`);
            };

            if (!isAuthenticated) return <LoginScreen onLogin={() => setIsAuthenticated(true)} />;

            return (
                <div className="flex flex-col h-full font-sans relative p-3 gap-3">
                    {/* 這裡統一放置所有的 Modal (置頂) */}
                    {confirmAction && <ConfirmModal title={confirmAction.title} message={confirmAction.message} isDangerous={confirmAction.isDangerous} onCancel={() => setConfirmAction(null)} onConfirm={executeConfirmAction} />}
                    {alertMessage && <AlertModal message={alertMessage} onClose={() => setAlertMessage(null)} />}
                    {editingProps && <EditStoreModal store={editingProps} onClose={() => setEditingProps(null)} onSave={handleSaveProps} />}
                    <PasteModal isOpen={showPasteModal} onClose={() => setShowPasteModal(false)} onProcess={handlePasteImport} />
                    
                    {/* 頂部標題列 (Glassmorphism) */}
                    <header className="bg-white/90 backdrop-blur-md rounded-2xl shadow-sm border border-white/50 px-6 py-4 flex justify-between items-center z-10 relative">
                        <div className="flex items-center gap-3">
                            <div className="bg-gradient-to-tr from-indigo-500 to-purple-500 p-2.5 rounded-xl shadow-md text-white">
                                <i className="fa-solid fa-store text-lg"></i>
                            </div>
                            <h1 className="font-black text-xl text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 tracking-wide">
                                加盟戰情室
                            </h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <span className="text-sm font-bold text-indigo-600 bg-indigo-50 px-4 py-1.5 rounded-full border border-indigo-100 shadow-inner">
                                總計 {stores.length} 間
                            </span>
                            <button onClick={() => setConfirmAction({type: 'reset', title:'⚙️ 重設系統', message:'要清除登入紀錄和地圖資料嗎？', isDangerous:true})} className="text-xs text-slate-400 hover:text-indigo-600 font-bold transition-colors px-3 py-1.5 rounded-full hover:bg-slate-100">
                                <i className="fa-solid fa-rotate-left"></i> 登出並重設
                            </button>
                        </div>
                    </header>

                    <div className="flex flex-1 overflow-hidden gap-3 relative z-10">
                        {/* 左側面板 */}
                        <div className="w-80 bg-white/90 backdrop-blur-xl border border-white/60 rounded-[2rem] shadow-xl flex flex-col overflow-hidden">
                            
                            {/* 狀態列 */}
                            <div className="p-5 border-b border-slate-100/50 bg-slate-50/50">
                                <div className={`p-4 rounded-2xl border-2 text-sm font-bold flex flex-col gap-2 transition-all duration-300 ${statusType === 'error' ? 'bg-rose-50 border-rose-200 text-rose-700 shadow-sm shadow-rose-100' : statusType === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-700 shadow-sm shadow-emerald-100' : 'bg-white border-slate-200 text-slate-600 shadow-sm'}`}>
                                    <div className="flex items-center gap-2">
                                        {statusType === 'error' ? <i className="fa-solid fa-triangle-exclamation"></i> : statusType === 'success' ? <i className="fa-solid fa-check"></i> : <i className="fa-solid fa-location-arrow"></i>}
                                        <span>雷達回報</span>
                                    </div>
                                    <div className="text-xs opacity-90 leading-relaxed">{statusMsg}</div>
                                </div>
                            </div>

                            {/* 控制區 */}
                            <div className="p-5 flex-1 overflow-y-auto custom-scrollbar">
                                <h3 className="text-xs font-black text-slate-400 mb-3 tracking-widest uppercase ml-1">操作盤</h3>
                                
                                <button onClick={()=>setMode('check')} className={`w-full text-left px-5 py-4 rounded-2xl border-2 text-sm font-bold flex gap-3 items-center transition-all duration-200 mb-4 ${mode==='check'?'bg-indigo-50 border-indigo-400 text-indigo-700 shadow-md shadow-indigo-100 scale-[1.02]':'bg-white border-slate-200 text-slate-600 hover:border-indigo-300 hover:bg-indigo-50/30'}`}>
                                    <div className={`p-1.5 rounded-lg ${mode==='check'?'bg-indigo-200':'bg-slate-100'}`}><i className="fa-solid fa-arrow-pointer"></i></div>
                                    📍 智慧探測
                                </button>

                                <div className="border-2 border-slate-100 rounded-2xl p-4 bg-slate-50/50 mb-6 relative overflow-hidden">
                                    {mode !== 'check' && <div className="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-indigo-400 to-purple-400"></div>}
                                    <h3 className="text-xs font-black text-slate-600 mb-3 flex items-center gap-1"><i className="fa-solid fa-plus"></i> 建立新據點</h3>
                                    
                                    <input value={newStoreName} onChange={e=>setNewStoreName(e.target.value)} placeholder="給店鋪取個響亮的名字..." className="w-full px-4 py-3 text-sm rounded-xl mb-3 border border-slate-200 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none font-bold text-slate-700 placeholder-slate-400 shadow-sm" />
                                    
                                    <div className="flex items-center gap-2 mb-4 bg-white p-2 rounded-xl border border-slate-200 shadow-sm">
                                        <span className="text-xs font-bold text-slate-500 ml-2">預設圓形半徑</span>
                                        <input type="number" value={defaultRadius} onChange={e=>setDefaultRadius(Number(e.target.value))} className="flex-1 w-full bg-transparent text-right font-black text-indigo-600 outline-none pr-2" />
                                        <span className="text-xs font-bold text-slate-400 pr-2">m</span>
                                    </div>

                                    <div className="flex gap-2">
                                        <button onClick={()=>setMode('add-radius')} className={`flex-1 flex flex-col items-center justify-center gap-2 py-4 rounded-xl text-xs font-black border-2 transition-all ${mode==='add-radius'?'bg-indigo-600 border-indigo-600 text-white shadow-lg shadow-indigo-200 scale-105':'bg-white border-slate-200 text-slate-600 hover:border-indigo-300 hover:bg-indigo-50'}`}>
                                            <div className={`p-2 rounded-full ${mode==='add-radius'?'bg-white/20':'bg-indigo-100 text-indigo-600'}`}><i className="fa-solid fa-location-dot"></i></div>
                                            定點展店
                                        </button>
                                        <button onClick={()=>setMode('add-polygon')} className={`flex-1 flex flex-col items-center justify-center gap-2 py-4 rounded-xl text-xs font-black border-2 transition-all ${mode==='add-polygon'?'bg-purple-600 border-purple-600 text-white shadow-lg shadow-purple-200 scale-105':'bg-white border-slate-200 text-slate-600 hover:border-purple-300 hover:bg-purple-50'}`}>
                                            <div className={`p-2 rounded-full ${mode==='add-polygon'?'bg-white/20':'bg-purple-100 text-purple-600'}`}><i className="fa-solid fa-layer-group"></i></div>
                                            自由圈地
                                        </button>
                                    </div>

                                    {/* 多邊形操作列 */}
                                    {mode === 'add-polygon' && (
                                        <div className="mt-4 p-3 bg-purple-50 rounded-xl border border-purple-100 animate-[scale-in_0.2s_ease-out]">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-[11px] font-bold text-purple-700">選擇魔法顏料 🎨</span>
                                                <span className="text-[10px] font-bold text-purple-400 bg-white px-2 py-0.5 rounded-full border border-purple-100">{tempPolygon.length} 點</span>
                                            </div>
                                            <div className="flex flex-wrap gap-2 mb-3 justify-center">
                                                {POLYGON_COLORS.map(c => (
                                                    <button key={c} onClick={() => setPolygonColor(c)} className={`w-5 h-5 rounded-full border-2 transition-transform ${polygonColor === c ? 'border-slate-800 scale-125 shadow-md' : 'border-transparent hover:scale-110'}`} style={{ backgroundColor: c }} />
                                                ))}
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={undoLastPoint} disabled={!isPolygonClosed && tempPolygon.length === 0} className="flex-1 py-2 bg-white border border-purple-200 text-purple-600 text-xs font-bold rounded-lg hover:bg-purple-100 active:scale-95 transition-transform disabled:opacity-50"><i className="fa-solid fa-rotate-left"></i> 悔棋</button>
                                                <button onClick={savePolygonStore} disabled={!isPolygonClosed} className={`flex-[2] py-2 text-white text-xs font-bold rounded-lg shadow-md active:scale-95 transition-transform ${isPolygonClosed ? 'bg-gradient-to-r from-purple-500 to-indigo-500 hover:from-purple-400 hover:to-indigo-400' : 'bg-gray-400 cursor-not-allowed'}`}><i className="fa-solid fa-check"></i> 施放結界</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                                
                                {/* 匯入匯出區 */}
                                <h3 className="text-xs font-black text-slate-400 mb-3 tracking-widest uppercase ml-1 flex items-center gap-1"><i className="fa-solid fa-toolbox"></i> 秘密武器</h3>
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept=".xlsx,.csv" className="hidden" />
                                    <button onClick={() => fileInputRef.current.click()} disabled={isProcessing} className="bg-white border-2 border-slate-100 text-slate-600 text-xs font-bold py-3 rounded-xl hover:bg-slate-50 hover:border-slate-300 transition-all flex flex-col items-center gap-1 shadow-sm">
                                        {isProcessing ? <i className="fa-solid fa-spinner fa-spin text-indigo-500"></i> : <i className="fa-solid fa-file-excel text-indigo-500 text-lg"></i>} 
                                        Excel 匯入
                                    </button>
                                    <button onClick={() => {
                                        let csv = "\uFEFF店名,緯度,經度,半徑\n";
                                        stores.forEach(s => { if(s.type==='radius') csv += `${s.name},${s.center[0]},${s.center[1]},${s.radius}\n`; });
                                        const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' })); link.download = "戰情庫匯出.csv"; link.click();
                                    }} className="bg-white border-2 border-slate-100 text-slate-600 text-xs font-bold py-3 rounded-xl hover:bg-slate-50 hover:border-slate-300 transition-all flex flex-col items-center gap-1 shadow-sm">
                                        <i className="fa-solid fa-download text-emerald-500 text-lg"></i> 匯出清單
                                    </button>
                                    <button onClick={() => setShowPasteModal(true)} className="col-span-2 bg-indigo-50 text-indigo-700 text-xs font-bold py-3 rounded-xl border border-indigo-100 flex justify-center gap-2 items-center hover:bg-indigo-100 transition-colors shadow-sm">
                                        <i className="fa-solid fa-clipboard text-lg"></i> 快速貼上地址匯入
                                    </button>
                                    <button onClick={() => setConfirmAction({type:'clear', title:'⚠️ 毀滅指令', message:'您確定要夷平所有據點嗎？\n這將無法復原喔！', isDangerous:true})} className="col-span-2 bg-rose-50 text-rose-600 text-xs font-bold py-3 rounded-xl hover:bg-rose-100 transition-all flex justify-center gap-2 items-center border border-rose-100 mt-2 shadow-sm">
                                        <i className="fa-solid fa-trash text-lg"></i> 夷平地圖
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Map */}
                        <div className="flex-1 relative rounded-[2rem] overflow-hidden shadow-xl border-4 border-white/80">
                            {!mapLoaded && (
                                <div className="absolute inset-0 flex flex-col gap-4 items-center justify-center bg-white/80 backdrop-blur z-50 text-indigo-500">
                                    <i className="fa-solid fa-spinner fa-spin text-4xl"></i>
                                    <p className="font-bold animate-pulse">正在展開全息地圖...</p>
                                </div>
                            )}
                            
                            {mode === 'add-polygon' && (
                                <div className="absolute top-6 left-1/2 transform -translate-x-1/2 z-[2000] flex flex-col gap-3 items-center pointer-events-none">
                                    <div className="bg-white/90 backdrop-blur-md text-indigo-800 px-6 py-3 rounded-full shadow-xl text-sm font-black border-2 border-indigo-100 animate-bounce">
                                        🖍️ 點擊地圖開始畫圈圈，畫完雙擊滑鼠就搞定啦 ✨
                                    </div>
                                </div>
                            )}

                            <div id="map-container" ref={mapRef} className="w-full h-full"></div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
